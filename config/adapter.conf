# qemu-eipadpter sample configuration
# INI-style: key = value, '#' or ';' begin comments, [sections] are ignored.
# Command-line flags override anything set here.

# --- network / addressing ---
bind = 0.0.0.0
#ip  = 192.168.1.50            # advertised in ListIdentity (auto-learned if unset)

# --- assembly instances ---
out_inst = 150                 # O->T (output, consumed by adapter)
in_inst  = 100                 # T->O (input, produced by adapter)
cfg_inst = 151                 # configuration

# --- Class 1 connection policy (validated against Forward Open) ---
out_size   = 32                # required O->T size in bytes (0 = accept any)
in_size    = 32                # required T->O size in bytes (0 = accept any)
rpi_min_ms = 1                 # reject Forward Open with smaller RPI (0 = no limit)
rpi_max_ms = 1000              # reject Forward Open with larger RPI  (0 = no limit)
rpi_ms     = 10                # RPI advertised in the generated EDS
timeout_ms = 0                 # O->T inactivity timeout override (0 = RPI * multiplier)

# --- accepted application connection kinds (1 = allow, 0 = reject) ---
allow_exclusive   = 1          # Exclusive-Owner (owns outputs, produces inputs)
allow_input_only  = 1          # Input-Only (heartbeat O->T, produces inputs)
allow_listen_only = 1          # Listen-Only (heartbeat O->T, needs a producer)

# --- real-time format / behaviour ---
ot_run_idle = 1                # O->T carries a 32-bit run/idle header
to_run_idle = 0                # prepend a 32-bit run/idle header on T->O
loopback    = 1                # mirror consumed O->T into produced T->O

# --- identity ---
vendor_id    = 0x1234
vendor_name  = QEMU
device_type  = 12              # 12 = Communications Adapter
product_code = 0x0065
serial       = 0x00C0FFEE
rev_major    = 1
rev_minor    = 1
product_name = QEMU EIP Adapter
